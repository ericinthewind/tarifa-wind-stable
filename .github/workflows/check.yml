name: Check

on:
  pull_request:
  push:
    branches: ["develop", "feature/**"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate fallback data
        run: |
          mkdir -p public
          echo '{"spot":"Tarifa","timezone":"Europe/Madrid","profile":"kite","generatedAt":"2026-01-01T00:00:00+01:00","criteria":{},"sessions":[]}' > public/forecast.json
          echo 'BEGIN:VCALENDAR
          VERSION:2.0
          END:VCALENDAR' > public/tarifa-wind.ics

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
