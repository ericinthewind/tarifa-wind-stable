name: Deploy production

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate forecast data and iCal
        env:
          PROFILE: kite
          OUTPUT_JSON: public/forecast.json
          OUTPUT_ICS: public/tarifa-wind.ics
        run: python scripts/generate_forecast.py
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install react react-dom lucide-react recharts --no-audit --no-fund
          npm install -D @types/react @types/react-dom @vitejs/plugin-react typescript vite --no-audit --no-fund
          npm list react lucide-react typescript

      - name: Build web app
        run: npm run build

      - name: Copy feeds into built app
        run: |
          cp public/forecast.json dist/forecast.json
          cp public/tarifa-wind.ics dist/tarifa-wind.ics

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
